name: Build Electron Cash plugins

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Zip plugin folders
        run: |
          mkdir -p dist/ec-plugins
          zip -r dist/ec-plugins/stealth-ec-plugin.zip stealth/
          zip -r dist/ec-plugins/rpa-ec-plugin.zip rpa/
          echo "Built from commit: $(git rev-parse --short HEAD)" > dist/ec-plugins/build-info.txt
          cat dist/ec-plugins/build-info.txt

      - name: Force-update rolling tag
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag -f electron-cash-plugins-latest
          git push origin -f electron-cash-plugins-latest

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: electron-cash-plugins-latest
          name: Electron Cash Plugins (latest)
          body: |
            Electron Cash plugin bundles built from source.

            Install in Electron Cash via Tools -> Install plugin -> select zip file.
          files: |
            dist/ec-plugins/stealth-ec-plugin.zip
            dist/ec-plugins/rpa-ec-plugin.zip
          overwrite_files: true
