name: Build and release BCH Stealth Wallet

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    name: Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            script: desktop:build:linux
            artifact_name: desktop-linux
          - os: windows-latest
            script: desktop:build:win
            artifact_name: desktop-windows
          - os: macos-14
            script: desktop:build:mac
            artifact_name: desktop-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build:landing

      - name: Build desktop packages
        run: npm run ${{ matrix.script }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/desktop/*.AppImage
            dist/desktop/*.exe
            dist/desktop/*.zip
            dist/desktop/*.dmg
          if-no-files-found: error

  build-android:
    name: Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build release APK
        run: npm run android:build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  release:
    name: Attach artifacts to release
    runs-on: ubuntu-22.04
    needs: [build-desktop, build-android]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Force-update rolling tag
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag -f BCH-Stealth-Wallet-latest
          git push origin -f BCH-Stealth-Wallet-latest

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          TAG="BCH-Stealth-Wallet-latest"
          TITLE="BCH Stealth Wallet (latest)"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE"
          else
            gh release create "$TAG" --title "$TITLE" --notes "Rolling latest build artifacts."
          fi

          mapfile -t FILES < <(find release-assets -type f)
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No release assets found under release-assets/."
            exit 1
          fi

          gh release upload "$TAG" "${FILES[@]}" --clobber