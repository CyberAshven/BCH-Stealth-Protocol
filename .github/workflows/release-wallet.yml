name: Build and release BCH Stealth Wallet

on:
  push:
    tags:
      - BCH-Stealth-Wallet-v*
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to build and release
        required: true
        default: BCH-Stealth-Wallet-v1.0.0

permissions:
  contents: write

jobs:
  build-desktop:
    name: Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            script: desktop:build:linux
            artifact_name: desktop-linux
          - os: windows-latest
            script: desktop:build:win
            artifact_name: desktop-windows
          - os: macos-14
            script: desktop:build:mac
            artifact_name: desktop-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop packages
        run: npm run ${{ matrix.script }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/desktop/**/*
          if-no-files-found: error

  build-android:
    name: Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build release APK
        run: npm run android:build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  release:
    name: Attach artifacts to release
    runs-on: ubuntu-22.04
    needs: [build-desktop, build-android]

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create or update release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: release-assets/**/*
          overwrite_files: true
          fail_on_unmatched_files: true
          generate_release_notes: true