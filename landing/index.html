<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0c0d12">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-name" content="0penw0rld">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <title>00 Protocol</title>

  <!-- Fonts -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap');
  </style>

  <!-- Mobile shell styles (hacker theme) -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #00ff41; --green-dim: #00c832; --green-dark: #003d0f; --accent-rgb: 0,255,65;
      --black: #020a03; --grey: #0a110a; --panel: #060e06;
      --red: #ff4040; --gold: #f0a500;
    }
    html, body { width:100%; height:100%; background:var(--black); font-family:'Share Tech Mono',monospace; display:flex; align-items:center; justify-content:center; overflow:hidden; }

    /* Mobile decorations */
    #rain { position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.12; }
    .scanlines { position:fixed; inset:0; z-index:1; pointer-events:none; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px); }
    .vignette { position:fixed; inset:0; z-index:1; pointer-events:none; background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,.9) 100%); }

    /* Phone mockup (mobile) */
    .phone-wrap { position:relative; z-index:2; }
    .phone {
      width: 375px; max-height: 812px; height: 95vh;
      background: var(--black);
      border-radius: 40px;
      border: 2px solid rgba(var(--accent-rgb),.15);
      overflow: hidden;
      display: flex; flex-direction: column;
      box-shadow: 0 0 30px rgba(var(--accent-rgb),.08), inset 0 0 30px rgba(0,0,0,.5);
      position: relative;
    }

    /* View container */
    #view-container {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: rgba(var(--accent-rgb),.2) transparent;
    }
    #view-container.loading {
      display: flex; align-items: center; justify-content: center;
    }
    #view-container.loading::after {
      content: ''; width: 24px; height: 24px;
      border: 2px solid rgba(var(--accent-rgb),.2);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast notifications */
    .app-toast {
      position: fixed; right: 20px; z-index: 10000;
      padding: 10px 18px; border-radius: 8px;
      font-size: 12px; font-weight: 600;
      background: var(--green); color: var(--black);
      box-shadow: 0 4px 12px rgba(0,0,0,.3);
      animation: toastIn .3s ease;
      pointer-events: none;
    }
    .app-toast.error { background: var(--red); color: #fff; }
    .app-toast.warning { background: var(--gold); color: var(--black); }
    @keyframes toastIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    /* Desktop: hide mobile shell, show SPA layout */
    @media (min-width: 900px) {
      #rain, .scanlines, .vignette { display: none !important; }
      .phone-wrap { display: none !important; }
      body { background: var(--black); overflow: auto; display: block; }
    }
  </style>

  <!-- Desktop styles -->
  <link rel="stylesheet" href="desktop.css">
</head>
<body>
  <!-- Mobile decorations -->
  <canvas id="rain"></canvas>
  <div class="scanlines"></div>
  <div class="vignette"></div>

  <!-- Mobile: phone mockup -->
  <div class="phone-wrap">
    <div class="phone">
      <div id="view-container"></div>
    </div>
  </div>

  <!-- Desktop: sidebar injected by shell.js, views render in #view-container-desktop -->
  <div id="view-container-desktop" style="display:none"></div>

  <!-- Shared infrastructure (non-module, legacy compat) -->
  <script src="ws-bridge.js?v=10"></script>
  <script src="chains.js?v=10"></script>
  <script src="ledger.js"></script>
  <script src="wizardconnect.js"></script>
  <script src="shell.js?v=10"></script>

  <!-- SPA bootstrap (ES module) -->
  <script type="module" src="app.js?v=10"></script>
</body>
</html>
