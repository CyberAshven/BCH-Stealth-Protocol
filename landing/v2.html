<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f5f6f8">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-name" content="BCH Stealth Wallet">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <title>BCH Stealth Wallet</title>

  <!-- Theme init — must run before CSS renders to avoid flash/black screen -->
  <script>
    (function(){
      var t = localStorage.getItem('00_theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <!-- Fonts -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap');
  </style>

  <!-- App base styles — clean design system, no matrix -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--dt-bg, #f5f6f8);
      color: var(--dt-text, #1a1a2e);
      overflow: hidden;
    }

    /* Matrix decorations — hidden everywhere (kept in DOM for JS compat) */
    #rain, .scanlines, .vignette { display: none !important; }

    /* Phone wrap → full-screen layout on mobile */
    .phone-wrap {
      position: fixed; inset: 0; z-index: 2;
      display: flex; flex-direction: column;
      background: var(--dt-bg, #f5f6f8);
    }
    .phone {
      flex: 1; display: flex; flex-direction: column;
      background: var(--dt-bg, #f5f6f8);
      overflow: hidden;
      border-radius: 0; border: none; box-shadow: none;
    }
    .notch, .notch-cam, .notch-speaker, .status-bar, .home-indicator { display: none !important; }

    /* Content area */
    #view-container {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: rgba(10,193,142,.2) transparent;
      background: var(--dt-bg, #f5f6f8);
    }
    #view-container.loading {
      display: flex; align-items: center; justify-content: center;
    }
    #view-container.loading::after {
      content: ''; width: 24px; height: 24px;
      border: 2px solid var(--dt-border, #e2e8f0);
      border-top-color: var(--dt-accent, #0AC18E);
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast notifications — above bottom nav */
    .app-toast {
      position: fixed; right: 16px; bottom: 80px; z-index: 10000;
      padding: 10px 18px; border-radius: 10px;
      font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif;
      background: var(--dt-accent, #0AC18E); color: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,.15);
      animation: toastIn .3s ease; pointer-events: none;
    }
    .app-toast.error { background: var(--dt-danger, #ef4444); }
    .app-toast.warning { background: var(--dt-warning, #f59e0b); color: #1a1a2e; }
    @keyframes toastIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    /* Desktop: sidebar layout takes over, phone-wrap hidden */
    @media (min-width: 900px) {
      .phone-wrap { display: none !important; }
      body { overflow: auto; display: block; }
    }
  </style>

  <!-- Desktop styles -->
  <link rel="stylesheet" href="desktop.css">
</head>
<body>
  <!-- Mobile decorations -->
  <canvas id="rain"></canvas>
  <div class="scanlines"></div>
  <div class="vignette"></div>

  <!-- Mobile: phone mockup -->
  <div class="phone-wrap">
    <div class="phone">
      <div id="view-container"></div>
    </div>
  </div>

  <!-- Desktop: sidebar injected by shell.js, views render in #view-container-desktop -->
  <div id="view-container-desktop" style="display:none"></div>

  <!-- Shared infrastructure (non-module, legacy compat) -->
  <script src="ws-bridge.js?v=10"></script>
  <script src="chains.js?v=11"></script>
  <script src="ledger.js"></script>
  <script src="wizardconnect.js"></script>
  <script src="shell.js?v=11"></script>

  <!-- SPA bootstrap (ES module) -->
  <script type="module" src="app.js?v=10"></script>
</body>
</html>
